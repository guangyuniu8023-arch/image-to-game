<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>汪汪跑酷</title>
<style>
  @font-face { font-family: Kenney; src: url("kenney.ttf"); }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #20242b;
    font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
    -webkit-user-select: none; user-select: none; touch-action: none; }
  #stage { position: fixed; overflow: hidden; background: #87CEEB; }
  #c { position: absolute; inset: 0; display: block; }
  #hud { position: absolute; top: 12px; left: 12px; right: 12px; display: none;
    justify-content: space-between; pointer-events: none; z-index: 5; }
  /* HUD chip：Kenney 灰底描边按钮九宫格 */
  .chip { display: flex; align-items: center; gap: 6px; height: 50px; padding: 0 12px;
    font-size: 17px; font-weight: 900; color: #4E342E;
    border-image: url("chip_grey.png") 20 fill / 20px; border-style: solid; border-width: 10px; }
  .chip span { font-family: Kenney, "PingFang SC", sans-serif; font-size: 19px; }
  .chip img { width: 22px; height: 22px; object-fit: contain; }
  .chip svg { width: 22px; height: 22px; }
  /* 全屏面板 */
  #panel { position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; z-index: 10;
    background: rgba(40,60,80,.35); color: #fff; text-align: center; }
  .logo { font-size: 64px; font-weight: 900; color: #FFF; line-height: 1.1;
    text-shadow: -3px -3px 0 #B33A2B, 3px -3px 0 #B33A2B, -3px 3px 0 #B33A2B, 3px 3px 0 #B33A2B,
      -3px 0 0 #B33A2B, 3px 0 0 #B33A2B, 0 -3px 0 #B33A2B, 0 3px 0 #B33A2B,
      0 7px 0 #8E2F23, 0 12px 20px rgba(0,0,0,.35);
    animation: bob 1.6s ease-in-out infinite alternate; }
  .sub { margin-top: 12px; font-family: Kenney, "PingFang SC", sans-serif; font-size: 19px;
    letter-spacing: 6px; opacity: .95; text-shadow: 0 2px 0 rgba(0,0,0,.3); }
  @keyframes bob { from { transform: translateY(0); } to { transform: translateY(-10px); } }
  .stars { margin-top: 16px; display: flex; gap: 8px; }
  .stars img { width: 32px; }
  #panel img.hero { width: 150px; margin-top: 10px; filter: drop-shadow(0 8px 12px rgba(0,0,0,.3));
    animation: bob 1.2s ease-in-out infinite alternate; }
  /* Kenney PNG 按钮 */
  .btn { width: 230px; height: 76px; margin-top: 22px; display: flex; align-items: center;
    justify-content: center; gap: 8px; font-size: 24px; font-weight: 900; color: #fff;
    letter-spacing: 4px; text-shadow: 0 2px 0 rgba(0,0,0,.3);
    border-image: url("btn_red.png") 24 fill / 24px; border-style: solid; border-width: 12px;
    animation: breath 1.4s ease-in-out infinite alternate; }
  @keyframes breath { from { scale: 1; } to { scale: 1.04; } }
  .tips { margin-top: 20px; font-size: 15px; font-weight: bold; line-height: 1.9;
    text-shadow: 0 1px 0 rgba(0,0,0,.3); }
  .loadwrap { width: 300px; height: 26px; margin-top: 26px; background: rgba(255,255,255,.35);
    border-radius: 13px; overflow: hidden; border: 3px solid rgba(255,255,255,.6); }
  .loadbar { height: 100%; background: #FFF8EC; border-radius: 9px; transition: width .2s; }
  /* 结算卡片 */
  .card { width: 320px; background: #FFF8EC; border: 5px solid #6D4C41; border-radius: 24px;
    box-shadow: 0 8px 0 rgba(0,0,0,.25); color: #4E342E; padding-bottom: 28px; }
  .card .head { background: #E53935; color: #fff; font-size: 28px; font-weight: 900;
    letter-spacing: 6px; padding: 16px 0 13px; border-bottom: 5px solid #6D4C41;
    border-radius: 18px 18px 0 0; text-shadow: 0 2px 0 rgba(0,0,0,.25); }
  .card .stars { margin-top: 14px; justify-content: center; }
  .card .stars img { width: 36px; }
  .card .label { margin-top: 12px; font-size: 15px; font-weight: bold; color: #A1887F; }
  .card .score { font-family: Kenney, "PingFang SC", sans-serif; font-size: 52px; }
  .card .pillrow { display: flex; justify-content: center; gap: 10px; margin-top: 12px; }
  .card .pill { display: flex; align-items: center; gap: 6px; background: #fff;
    border: 3px solid #D7CCC8; border-radius: 999px; padding: 6px 13px;
    font-size: 15px; font-weight: 900; }
  .card .pill img { width: 18px; height: 18px; object-fit: contain; }
  .card .btn { width: 200px; height: 66px; margin: 20px auto 0; font-size: 20px; }
</style>
</head>
<body>
<div id="stage">
<canvas id="c"></canvas>
<div id="hud">
  <div class="chip"><img src="bone.png" alt="">× <span id="bones">0</span></div>
  <div class="chip"><svg viewBox="0 0 40 36"><path d="M20 33 C8 24 2 17 2 10.5 C2 5 6.5 2 11 2 C15 2 18.5 4.5 20 8 C21.5 4.5 25 2 29 2 C33.5 2 38 5 38 10.5 C38 17 32 24 20 33 Z" fill="#E53935" stroke="#B33A2B" stroke-width="2"/></svg>× <span id="lives">3</span></div>
  <div class="chip">分数 <span id="score">0</span></div>
</div>
<div id="panel"></div>
</div>
<script src="three.min.js"></script>
<script src="GLTFLoader.js"></script>
<script>
"use strict";
/* ================= 构建标记与兼容模式 =================
   BUILD 上屏用于确认用户跑的是哪个版本；
   渲染连续失败 → 自动打 runner_safe 标记重载进入兼容模式（关 AA/阴影/描边、像素比 1），
   兼容模式仍失败 → 显示错误页，绝不静默蓝屏 */
const BUILD = "b250718-4";
const safeMode = (() => { try { return localStorage.getItem("runner_safe") === "1"; } catch (e) { return false; } })();
function enterSafeMode() {
  if (safeMode) { fatal("当前设备/浏览器无法运行 3D 画面，请更换浏览器或设备重试"); return; }
  try { localStorage.setItem("runner_safe", "1"); } catch (e) {}
  location.reload();
}
function fatal(msg) {
  const el = document.getElementById("panel");
  el.style.display = "flex";
  el.innerHTML = '<div class="card"><div class="head">画面出错了</div>'
    + '<div class="label" style="padding:24px 18px">' + msg + '<br><br>' + BUILD + '</div></div>';
}

/* ================= 输入 ================= */
const keys = {};
addEventListener("keydown", e => {
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Space"].includes(e.code)) e.preventDefault();
  keys[e.code] = true; anyKey();
});
addEventListener("keyup", e => keys[e.code] = false);
let tx = 0, ty = 0;
addEventListener("pointerdown", e => { tx = e.clientX; ty = e.clientY; anyKey(); });
addEventListener("pointerup", e => {
  const dx = e.clientX - tx, dy = e.clientY - ty;
  if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
  if (Math.abs(dx) > Math.abs(dy)) keys[dx > 0 ? "ArrowRight" : "ArrowLeft"] = true;
  else keys[dy > 0 ? "ArrowDown" : "ArrowUp"] = true;
  setTimeout(() => { keys.ArrowLeft = keys.ArrowRight = keys.ArrowUp = keys.ArrowDown = false; }, 80);
});

/* ================= 音效 ================= */
let AC = null;
function beep(freq, dur, type = "square", vol = 0.13, slide = 0) {
  try {
    if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, AC.currentTime);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(30, freq + slide), AC.currentTime + dur);
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.connect(g); g.connect(AC.destination); o.start(); o.stop(AC.currentTime + dur);
  } catch (e) {}
}
const sfx = {
  jump: () => beep(320, 0.18, "square", 0.1, 500),
  roll: () => beep(200, 0.15, "square", 0.09, 200),
  bone: () => { beep(900, 0.07, "sine", 0.14); setTimeout(() => beep(1350, 0.1, "sine", 0.14), 55); },
  hit:  () => beep(300, 0.4, "sawtooth", 0.14, -240),
  over: () => [400, 330, 260].forEach((f, i) => setTimeout(() => beep(f, 0.25, "square", 0.1), i * 160)),
};

/* ================= 逻辑层（纯数据，不依赖 THREE） ================= */
const LANES = [-2.2, 0, 2.2];
const LG = {
  state: "title",      // title | play | gameover
  speed: 12, maxSpeed: 30, dist: 0, score: 0, bones: 0, lives: 3,
  best: 0, time: 0, stateT: 0, slowT: 0,
  player: { lane: 0, x: 0, y: 0, vy: 0, rolling: 0, inv: 0 },
  obs: [], bonesArr: [], nextRowZ: -40, seed: 12345,
};
function rng() { LG.seed = (LG.seed * 1103515245 + 12345) % 2147483648; return LG.seed / 2147483648; }
function pick(arr) { return arr[Math.floor(rng() * arr.length)]; }

const OB = { TRAIN: "train", BARRIER: "barrier", BEAM: "beam" };

function spawnRow(z) {
  const lanes = [0, 1, 2];
  const r = rng();
  if (r < 0.22) {                       // 火车：占 1 条道
    const lane = pick(lanes);
    LG.obs.push({ lane, z, type: OB.TRAIN, len: 10 + rng() * 5, mesh: null });
  } else if (r < 0.55) {                // 护栏（跳过去）：占 1~2 条道
    const n = rng() < 0.5 ? 1 : 2;
    lanes.sort(() => rng() - 0.5).slice(0, n).forEach(lane =>
      LG.obs.push({ lane, z, type: OB.BARRIER, len: 0.6, mesh: null }));
  } else if (r < 0.8) {                 // 横梁（滑过去）：占 1~2 条道
    const n = rng() < 0.5 ? 1 : 2;
    lanes.sort(() => rng() - 0.5).slice(0, n).forEach(lane =>
      LG.obs.push({ lane, z, type: OB.BEAM, len: 0.6, mesh: null }));
  }
  // 50% 概率撒一排骨头（可能在障碍上方）
  if (rng() < 0.5) {
    const lane = pick(lanes);
    const arc = rng() < 0.4;
    for (let i = 0; i < 5; i++)
      LG.bonesArr.push({ lane, z: z - 3 + i * 1.6, y: arc ? 1.6 - Math.abs(i - 2) * 0.45 : 0.8, got: false, mesh: null });
  }
}

function newGame() {
  LG.state = "play"; LG.stateT = 0; LG.speed = 12; LG.dist = 0;
  LG.score = 0; LG.bones = 0; LG.lives = 3; LG.time = 0; LG.slowT = 0;
  LG.player = { lane: 0, x: 0, y: 0, vy: 0, rolling: 0, inv: 0 };
  LG.obs = []; LG.bonesArr = []; LG.nextRowZ = -50; LG.seed = (Date.now() % 100000) + 1;
  syncHud(); showPanel(null);
}

function hitObstacle() {
  if (LG.player.inv > 0) return;
  LG.lives--; LG.player.inv = 1.5; LG.slowT = 0.5; sfx.hit(); shakeT = 0.35;
  if (LG.lives <= 0) {
    LG.state = "gameover"; LG.stateT = 0; sfx.over();
    LG.best = Math.max(LG.best, LG.score);
    try { localStorage.setItem("runner_best", LG.best); } catch (e) {}
    showPanel("over");
  }
  syncHud();
}

function update(dt) {
  LG.time += dt; LG.stateT += dt;
  if (LG.state !== "play") return;
  const p = LG.player;
  const spd = LG.slowT > 0 ? LG.speed * 0.45 : LG.speed;
  if (LG.slowT > 0) LG.slowT -= dt;

  // 换道
  if (keys.ArrowLeft && p.lane > 0) { p.lane--; keys.ArrowLeft = false; }
  if (keys.ArrowRight && p.lane < 2) { p.lane++; keys.ArrowRight = false; }
  p.x += (LANES[p.lane] - p.x) * Math.min(1, dt * 12);

  // 跳跃 / 滑铲
  const onGround = p.y <= 0.001;
  if (keys.ArrowUp && onGround && p.rolling <= 0) { p.vy = 8.5; sfx.jump(); }
  keys.ArrowUp = false;
  if (keys.ArrowDown && p.rolling <= 0) { p.rolling = 0.65; sfx.roll(); if (!onGround) p.vy = -12; }
  keys.ArrowDown = false;
  if (p.rolling > 0) p.rolling -= dt;
  if (!onGround || p.vy > 0) {
    p.vy -= 25 * dt; p.y += p.vy * dt;
    if (p.y <= 0) { p.y = 0; p.vy = 0; }
  }
  if (p.inv > 0) p.inv -= dt;

  // 前进
  LG.dist += spd * dt;
  LG.score = Math.floor(LG.dist * 10) + LG.bones * 100;
  LG.speed = Math.min(LG.maxSpeed, LG.speed + dt * 0.45);

  // 世界前移
  for (const o of LG.obs) o.z += spd * dt;
  for (const b of LG.bonesArr) b.z += spd * dt;
  LG.nextRowZ += spd * dt;

  // 生成新排（间距随速度，保证反应时间 ≥1s）
  if (LG.nextRowZ > -150) {
    spawnRow(-180);
    LG.nextRowZ = -180 - Math.max(16, LG.speed * 1.15);
  }
  // 回收
  LG.obs = LG.obs.filter(o => o.z < 15);
  LG.bonesArr = LG.bonesArr.filter(b => b.z < 15 && !b.got);

  // 碰撞
  const px = p.x, feetY = p.y, headY = p.y + (p.rolling > 0 ? 1.0 : 2.2);
  for (const o of LG.obs) {
    if (Math.abs(o.z) > o.len / 2 + 0.4) continue;
    if (Math.abs(LANES[o.lane] - px) > 1.15) continue;
    let hit = false;
    if (o.type === OB.TRAIN) hit = headY > 0.1;
    else if (o.type === OB.BARRIER) hit = feetY < 1.0;
    else if (o.type === OB.BEAM) hit = headY > 1.55;
    if (hit) { hitObstacle(); break; }
  }
  // 吃骨头
  for (const b of LG.bonesArr) {
    if (b.got || Math.abs(b.z) > 0.9) continue;
    if (Math.abs(LANES[b.lane] - px) < 1.1 && Math.abs((feetY + 0.9) - b.y) < 1.0) {
      b.got = true; LG.bones++; sfx.bone(); syncHud();
    }
  }
  if (LG.time % 0.25 < dt) syncHud();
}

function anyKey() {
  if (!assetsReady) return;               // 资源未就绪不开局
  if (LG.state === "title") newGame();
  else if (LG.state === "gameover" && LG.stateT > 1.2) newGame();
}
</script>
<script>
"use strict";
/* ================= 3D 场景（程序化建模） ================= */
let scene, camera, renderer, trackTex;
/* 资源加载门：纹理 + DOM 图片全部就绪才开局，标题页显示进度条（杜绝慢网络下的占位/素模） */
const loadMgr = new THREE.LoadingManager();
const texLoader = new THREE.TextureLoader(loadMgr);
let assetsReady = false, texDone = 0, texTotal = 1, imgDone = 0;
const domAssets = ["puppy.png", "btn_red.png", "btn_green.png", "chip_grey.png", "star.png", "star_o.png", "play.png"];
const imgTotal = domAssets.length;
function loadProgress() { return { done: texDone + imgDone, total: texTotal + imgTotal }; }
function updateLoadingUI() {
  const p = loadProgress();
  assetsReady = p.done >= p.total;
  const bar = document.getElementById("loadbar"), txt = document.getElementById("loadtxt");
  if (bar) bar.style.width = (p.done / p.total * 100) + "%";
  if (txt) txt.textContent = "资源加载中 " + p.done + " / " + p.total;
  if (assetsReady && LG.state === "title") showPanel("title");
}
loadMgr.onProgress = (u, done, total) => { texDone = done; texTotal = total; updateLoadingUI(); };
loadMgr.onLoad = () => { buildScenery(); updateLoadingUI(); };   // GLB 全部就绪后再建远景
for (const src of domAssets) {
  const im = new Image();
  im.onload = im.onerror = () => { imgDone++; updateLoadingUI(); };
  im.src = src;
}
const boneTex = texLoader.load("bone.png");
/* 卡通描边：反向放大壳 */
const outlineMat = new THREE.MeshBasicMaterial({ color: 0x2a2320, side: THREE.BackSide });
function outline(m, th = 1.045) {
  if (safeMode) return m;                       // 兼容模式省一半网格
  const o = new THREE.Mesh(m.geometry, outlineMat);
  o.scale.set(th, th, th);
  o.raycast = () => {};
  m.add(o);
  return m;
}

/* ================= 外部模型库（Quaternius，CC0） =================
   全部经 loadMgr 加载（并入加载门进度条）；加载后统一：
   转 Lambert 平光 + 描边 + 归一化（高=1 或 宽=1，锚点=底部中心）存为模板，游戏中 clone 使用 */
const gltfLoader = THREE.GLTFLoader ? new THREE.GLTFLoader(loadMgr) : null;   // 无 GLTFLoader 时回退程序化建模
const TPL = {};            // name → { g: 原型组, dims: Vector3(归一化后尺寸) }
const MODEL_FILES = [
  "Tree1", "Tree2", "Tree3", "Tree4", "Bush1", "Bush2", "Bush3", "Rock1", "Rock2", "Grass1",
  "House", "House2", "House4", "House5",
  "Fence", "Fence2",
  "CargoTrain_Front", "CargoTrain_Wagon", "CargoTrain_Container",
];
const NO_OUTLINE = { Grass1: 1 };        // 太小的物件描边是噪点
const HOUSE_TEX = { House: "HouseTexture1", House2: "HouseTexture2", House4: "HouseTexture4", House5: "HouseTexture1" };
const RECOLOR = { Rock: new THREE.Color(0.36, 0.34, 0.31) };   // 石头原色太黑，提亮
const TRAIN_W = 1.9;       // 火车占道宽
const TREES = ["Tree1", "Tree2", "Tree3", "Tree4"];
const HOUSES = ["House", "House2", "House4", "House5"];
const DECO = ["Bush1", "Bush2", "Bush3", "Rock1", "Rock2"];
const NEAR = ["Grass1", "Grass1", "Bush1", "Bush3", "Rock1", "Rock2"];   // 近轨点缀带

function prepModel(name, gltf, normMode) {
  const root = gltf.scene;
  const meshes = [];
  root.traverse(m => { if (m.isMesh) meshes.push(m); });   // 先收集：traverse 回调里 add 会死循环
  for (const m of meshes) {
    const src = m.material;
    const mat = new THREE.MeshLambertMaterial({
      color: src.color ? src.color.clone() : 0xffffff,
      name: src.name || "",
    });
    if (HOUSE_TEX[name]) {                     // 房子：手动配 32px 调色板贴图（门窗立面）
      const t = texLoader.load("models/" + HOUSE_TEX[name] + ".png");
      t.flipY = false; t.encoding = THREE.sRGBEncoding;
      mat.map = t;
    }
    if (RECOLOR[mat.name]) mat.color.copy(RECOLOR[mat.name]);
    m.material = mat;
    m.castShadow = true;
    if (!NO_OUTLINE[name]) outline(m);
  }
  // 火车：长轴对齐 z（游戏前进轴），宽轴留 x
  let box = new THREE.Box3().setFromObject(root);
  let size = new THREE.Vector3(); box.getSize(size);
  if (normMode === "train" && size.x > size.z) {
    root.rotation.y = Math.PI / 2;
    box = new THREE.Box3().setFromObject(root);
    box.getSize(size);
  }
  // 归一化：树房栅栏按高=1；火车按宽=1。锚点移到"底部中心"
  const ref = normMode === "h" ? size.y : size.x;
  const s = 1 / (ref || 1);
  root.scale.set(s, s, s);
  const b2 = new THREE.Box3().setFromObject(root);
  root.position.set(-(b2.min.x + b2.max.x) / 2, -b2.min.y, -(b2.min.z + b2.max.z) / 2);
  const wrap = new THREE.Group(); wrap.add(root);
  const dims = new THREE.Vector3(); b2.getSize(dims);
  TPL[name] = { g: wrap, dims };
}
if (gltfLoader) {
  for (const f of MODEL_FILES) {
    gltfLoader.load("models/" + f + ".glb",
      g => prepModel(f, g, f.startsWith("CargoTrain") ? "train" : "h"),
      undefined,
      err => console.warn("模型加载失败", f, err));
  }
}
const tplReady = () => MODEL_FILES.every(f => TPL[f]);

function makeCanvas(w, h, draw) {
  const cv2 = document.createElement("canvas");
  cv2.width = w; cv2.height = h;
  const g = cv2.getContext("2d");
  if (g) draw(g, w, h);
  return cv2;
}

function initScene() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 60, 200);
  camera = new THREE.PerspectiveCamera(62, innerWidth / innerHeight, 0.1, 400);
  camera.position.set(0, 4.1, 7.8);
  camera.lookAt(0, 1.35, -10);
  try {
    renderer = new THREE.WebGLRenderer({ canvas: document.getElementById("c"), antialias: !safeMode, stencil: false });
  } catch (e) { fatal("当前设备/浏览器不支持 3D 渲染，请更换浏览器重试"); throw e; }
  renderer.setPixelRatio(safeMode ? 1 : Math.min(devicePixelRatio, 1.5));   // 限像素比，防手机 GPU 显存爆掉丢上下文（整屏只剩底色）
  renderer.setSize(innerWidth, innerHeight);
  renderer.shadowMap.enabled = !safeMode;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  // 上下文丢失兜底：立即进兼容模式重载
  renderer.domElement.addEventListener("webglcontextlost", e => { e.preventDefault(); enterSafeMode(); });

  scene.add(new THREE.HemisphereLight(0xffffff, 0x77aa55, 0.75));
  const sun = new THREE.DirectionalLight(0xfff5e0, 0.9);
  sun.position.set(6, 14, 5);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024, 1024);
  sun.shadow.camera.left = -18; sun.shadow.camera.right = 18;
  sun.shadow.camera.top = 25; sun.shadow.camera.bottom = -40;
  sun.shadow.camera.near = 1; sun.shadow.camera.far = 60;
  scene.add(sun); scene.add(sun.target);

  // 轨道地面：512px 程序贴图（暖道砟+木枕+亮钢轨），滚动模拟前进

function updatePlayerMesh() {
  const p = LG.player;
  const roll = p.rolling > 0;
  const air = p.y > 0.02;
  const ph = LG.time * LG.speed * 1.6;
  const g = dog.g;

  // 跑步循环：对角腿成对摆动；着地才摆
  const swinging = !air && !roll && LG.state === "play";
  const sw = swinging ? 1 : 0;
  dog.legs[0].rotation.x = Math.sin(ph) * 0.9 * sw + (air ? -0.6 : 0);
  dog.legs[3].rotation.x = Math.sin(ph) * 0.9 * sw + (air ? -0.6 : 0);
  dog.legs[1].rotation.x = -Math.sin(ph) * 0.9 * sw + (air ? 0.5 : 0);
  dog.legs[2].rotation.x = -Math.sin(ph) * 0.9 * sw + (air ? 0.5 : 0);
  // 耳朵扑扇（相位滞后）、尾巴摇、围巾波浪（逐节延迟）
  dog.ears[0].rotation.x = Math.sin(ph - 0.7) * 0.35 * sw + (air ? -0.5 : 0);
  dog.ears[1].rotation.x = Math.sin(ph - 0.7) * 0.35 * sw + (air ? -0.5 : 0);
  dog.tail.rotation.y = Math.sin(LG.time * 9) * 0.35;
  for (let i = 0; i < 3; i++) {
    dog.scarf[i].rotation.x = Math.sin(ph * 0.6 - i * 0.9) * (0.25 + i * 0.12);
    dog.scarf[i].position.y = 1.06 + Math.sin(ph * 0.6 - i * 0.9 + 1) * 0.04;
  }
  // 位移/姿态
  const bob = swinging ? Math.abs(Math.sin(ph)) * 0.08 : 0;
  g.position.set(p.x, p.y + bob, 0);
  g.scale.set(1, roll ? 0.55 : (air ? 1.08 : 1), 1);
  g.rotation.z = -(LANES[p.lane] - p.x) * 0.22;   // 换道侧倾
  g.rotation.y = -(LANES[p.lane] - p.x) * 0.18;   // 换道转向前倾
  // 受伤闪烁
  g.visible = !(p.inv > 0 && Math.floor(LG.time * 12) % 2 === 0);
  const sc = Math.max(0.4, 1 - p.y * 0.35);
  shadowMesh.scale.set(sc, sc, sc);
  shadowMesh.position.x = p.x;
  shadowMesh.material.opacity = Math.max(0.25, 1 - p.y * 0.4);
}

/* 货车拼装：车头(朝玩家) + N 节车厢 + 尾部集装箱，总长贴 o.len；Main 材质按车道配色 */
function trainPiece(name, main, dark) {
  const c = TPL[name].g.clone(true);
  c.traverse(m => {
    if (!m.isMesh) return;
    const n = m.material.name;
    if (n === "Main" || n === "DarkMain") {
      m.material = m.material.clone();      // 克隆件共享材质，换色前必须克隆
      m.material.color.copy(n === "Main" ? main : dark);
    }
  });
  const d = TPL[name].dims;
  c.scale.set(TRAIN_W, d.y * TRAIN_W < 2.1 ? 2.1 / d.y : TRAIN_W, TRAIN_W);  // 宽 1.9，高不足则拔到 2.1
  return c;
}
function makeTrain(o) {
  if (!tplReady()) return makeTrainOld(o);
  const hex = [0xe05353, 0x53a0e0, 0x53b96b, 0xe0a353][o.lane % 4];
  const main = new THREE.Color(hex), dark = main.clone().multiplyScalar(0.55);
  const fL = TPL.CargoTrain_Front.dims.z * TRAIN_W;
  const wL = TPL.CargoTrain_Wagon.dims.z * TRAIN_W;
  const bL = TPL.CargoTrain_Container.dims.z * TRAIN_W;
  const n = Math.max(1, Math.round((o.len - fL - bL) / wL));
  const g = new THREE.Group();
  const parts = [trainPiece("CargoTrain_Front", main, dark)];
  for (let i = 0; i < n; i++) parts.push(trainPiece("CargoTrain_Wagon", main, dark));
  parts.push(trainPiece("CargoTrain_Container", main, dark));
  let cursor = o.len / 2, total = 0;
  parts.forEach((p, idx) => {
    const L = idx === 0 ? fL : idx === parts.length - 1 ? bL : wL;
    p.position.z = cursor - L / 2;
    cursor -= L; total += L;
    g.add(p);
  });
  g.scale.z = o.len / total;                // 总长贴合碰撞盒
  return g;
}
const stripeTex = new THREE.CanvasTexture(makeCanvas(128, 32, (g) => {
  g.fillStyle = "#FFD54A"; g.fillRect(0, 0, 128, 32);
  g.fillStyle = "#333";
  for (let x = -32; x < 128; x += 32) {
    g.beginPath(); g.moveTo(x, 32); g.lineTo(x + 16, 0); g.lineTo(x + 32, 0); g.lineTo(x + 16, 32); g.fill();

}));

function makeBarrier(o) {                   // 农场栅栏（Quaternius）：跳过去
  if (!tplReady()) return makeBarrierOld(o);

  c.scale.set(1.9 / d.x, 1.05, 1.05);       // 宽贴车道、高 1.05（碰撞：feetY<1.0）
  return c;
}
function makeBeam(o) {                      // 横梁：暖木柱 + 警示红梁 + 骨头牌（滑过去）
  const g = new THREE.Group();
  const postMat = new THREE.MeshLambertMaterial({ color: 0x8D6E63 });
  for (const s of [-0.95, 0.95]) {
    const post = new THREE.Mesh(new THREE.BoxGeometry(0.15, 2.6, 0.15), postMat);
    post.position.set(s, 1.3, 0); g.add(post);
  }
  const beam = new THREE.Mesh(new THREE.BoxGeometry(2.1, 0.35, 0.35),
    new THREE.MeshLambertMaterial({ color: 0xE53935 }));
  beam.position.y = 1.75; g.add(beam);
  const sign = new THREE.Mesh(new THREE.PlaneGeometry(0.55, 0.42),
    new THREE.MeshBasicMaterial({ map: boneTex, transparent: true, side: THREE.DoubleSide }));
  sign.position.y = 1.35; g.add(sign);
  [beam, ...g.children.filter(c => c !== beam && c !== sign)].forEach(p => { p.castShadow = true; outline(p); });
  return g;
}
const allMeshes = new Set();
function ensureMesh(o) {
  if (o.mesh) return;
  o.mesh = o.type === OB.TRAIN ? makeTrain(o) : o.type === OB.BARRIER ? makeBarrier(o) : makeBeam(o);
  o.mesh.position.x = LANES[o.lane];
  scene.add(o.mesh);
  allMeshes.add(o.mesh);
}
function syncWorld() {
  const keep = new Set();
  for (const o of LG.obs) { ensureMesh(o); o.mesh.position.z = o.z; keep.add(o.mesh); }
  for (const b of LG.bonesArr) {
    if (!b.mesh) {
      b.mesh = new THREE.Sprite(new THREE.SpriteMaterial({ map: boneTex, transparent: true }));
      b.mesh.scale.set(0.8, 0.8 * (boneTex.image ? boneTex.image.height / boneTex.image.width : 0.6), 1);
      scene.add(b.mesh);
      allMeshes.add(b.mesh);
    }
    b.mesh.position.set(LANES[b.lane], b.y + Math.sin(LG.time * 3 + b.z) * 0.1, b.z);
    b.mesh.material.rotation += 0.03;
    keep.add(b.mesh);
  }
  // 回收：数据已删除的对象，网格移出场景
  for (const m of Array.from(allMeshes)) {
    if (!keep.has(m)) { scene.remove(m); allMeshes.delete(m); }
  }
}
</script>
<script>
"use strict";
/* ================= HUD / 界面 ================= */
function syncHud() {
  document.getElementById("bones").textContent = LG.bones;
  document.getElementById("lives").textContent = LG.lives;
  document.getElementById("score").textContent = LG.score;
}
function showPanel(kind) {
  const el = document.getElementById("panel");
  const hud = document.getElementById("hud");
  if (!kind) { el.style.display = "none"; hud.style.display = "flex"; return; }
  hud.style.display = "none"; el.style.display = "flex";
  if (kind === "title") {
    const verTag = '<div style="position:absolute;right:10px;bottom:8px;font-size:11px;color:#fff;opacity:.65;'
      + 'text-shadow:0 1px 2px rgba(0,0,0,.3)">' + BUILD + (safeMode ? " · 兼容模式" : "") + '</div>';
    if (!assetsReady) {   // 资源加载中：Logo + 进度条
      const p = loadProgress();
      el.innerHTML = '<div class="logo">汪汪跑酷</div>'
        + '<div class="loadwrap"><div class="loadbar" id="loadbar" style="width:' + (p.done / p.total * 100) + '%"></div></div>'
        + '<div class="tips" id="loadtxt">资源加载中 ' + p.done + ' / ' + p.total + '</div>' + verTag;
      return;
    }
    el.innerHTML = '<div class="logo">汪汪跑酷</div>'
      + '<div class="sub">PUPPY RUN</div>'
      + '<div class="stars"><img src="star.png"><img src="star.png"><img src="star_o.png"></div>'
      + '<img class="hero" src="puppy.png">'
      + '<div class="btn">▶ 开始游戏</div>'
      + '<div class="tips">← → 换道　 ↑ 跳跃　 ↓ 滑铲<br>手机：左右滑换道 · 上滑跳 · 下滑铲</div>' + verTag;
  } else if (kind === "over") {
    const starN = Math.min(3, 1 + Math.floor(LG.score / 4000));
    let stars = "";
    for (let i = 0; i < 3; i++) stars += '<img src="' + (i < starN ? "star.png" : "star_o.png") + '">';
    el.innerHTML = '<div class="card"><div class="head">游戏结束</div>'
      + '<div class="stars">' + stars + '</div>'
      + '<div class="label">本局分数</div>'
      + '<div class="score">' + LG.score + '</div>'
      + '<div class="pillrow"><div class="pill"><img src="bone.png">× ' + LG.bones + '</div>'
      + '<div class="pill">🏆 最高 ' + LG.best + '</div></div>'
      + '<div class="btn">再来一次</div></div>';
  }
}

/* ================= 相机 ================= */
let shakeT = 0;
function updateCamera() {
  const px = LG.player.x;
  camera.position.x = px * 0.55 + (shakeT > 0 ? (Math.random() - 0.5) * 0.3 : 0);
  camera.position.y = 4.1 + (shakeT > 0 ? (Math.random() - 0.5) * 0.25 : 0);
  camera.lookAt(px * 0.4, 1.35, -10);
}

/* ================= 主循环（带渲染守卫：连续失败自动进兼容模式） ================= */
let lastT = 0, renderFails = 0, frames = 0;
function loop(t) {
  requestAnimationFrame(loop);
  let dt = (t - lastT) / 1000; lastT = t;
  if (dt > 1 / 30) dt = 1 / 30;
  if (dt < 0) dt = 0;
  try {
    update(dt);
    const spd = LG.state === "play" ? (LG.slowT > 0 ? LG.speed * 0.45 : LG.speed) : 0;
    if (spd > 0) {
      trackTex.offset.y += spd * dt / 13.33;
      updateScenery(dt, spd);
    }
    if (shakeT > 0) shakeT -= dt;
    updatePlayerMesh();
    syncWorld();
    updateCamera();
    renderer.render(scene, camera);
    renderFails = 0;
    // 渲染看门狗：资源就绪后 90 帧仍 0 个 drawcall = 静默不渲染（画布透明只剩底色）
    if (assetsReady && ++frames === 90 && renderer.info.render.calls === 0) enterSafeMode();
  } catch (e) {
    if (++renderFails >= 3) enterSafeMode();
  }
}

/* ================= 启动 ================= */
/* 竖屏锁定：游戏区永远是竖屏比例；横屏窗口时居中显示 9:16 舞台，两侧留边 */
function layout() {
  const MAX_A = 0.75;                       // 允许的最宽宽高比（约 3:4）
  let w = innerWidth, h = innerHeight;
  if (w / h > MAX_A) w = Math.round(h * 9 / 16);
  const st = document.getElementById("stage");
  st.style.width = w + "px"; st.style.height = h + "px";
  st.style.left = Math.round((innerWidth - w) / 2) + "px";
  st.style.top = Math.round((innerHeight - h) / 2) + "px";
  if (renderer) {
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
  }
}
try { LG.best = parseInt(localStorage.getItem("runner_best")) || 0; } catch (e) {}
initScene();
layout();
showPanel("title");
addEventListener("resize", layout);
requestAnimationFrame(loop);
</script>
</body>
